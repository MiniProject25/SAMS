services:
  backend:
    image: node:24.7.0-alpine
    working_dir: /backend
    volumes:
      - ../backend:/backend
    ports:
      - "6767:6767"
    command: sh -c "npm install && npx prisma generate && npm run dev"
    networks:
      - custom-network
    env_file:
      - ../backend/.env

  frontend:
    image: node:24.7.0-alpine
    working_dir: /frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/frontend
    networks:
      - custom-network
    command: sh -c "npm install && npm run dev -- --host"
    env_file:
      - ../frontend/.env

networks:
  custom-network:
    driver: bridge
